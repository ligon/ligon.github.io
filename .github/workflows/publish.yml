name: Publish to GitHub Pages

on:
    push:
        branches:
            - main

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            - name: Check out
              uses: actions/checkout@v1

            - name: Install emacs
              run: sudo apt install emacs-nox --yes

            - name: Build the site
              run: ./build.sh

            - name: Publish generated content
              uses: JamesIves/github-pages-deploy-action@v4.1.4
              with:
                branch: gh-pages
                folder: public
